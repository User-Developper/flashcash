<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FlashCash - Transfert</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<header>
    <h1>Transfert d'argent</h1>
    <nav>
        <a th:href="@{/}">Accueil</a> |
        <a th:href="@{/logout}">Déconnexion</a>
    </nav>
</header>

<main>
    <div th:if="${user != null}">
        <h2>Envoyer de l'argent</h2>

        <form th:action="@{/transfer}" method="post" th:object="${transferForm}">
            <div>
                <label>Destinataire (email) :</label>
                <input type="email" th:field="*{toUser}" placeholder="Email du destinataire" required />
            </div>
            <div>
                <label>Montant :</label>
                <input type="number" th:field="*{amountBeforeFee}" placeholder="Montant à envoyer" step="0.01" required />
            </div>
            <div>
                <button type="submit">Envoyer</button>
            </div>
        </form>

        <div th:if="${errorMessage != null}">
            <p th:text="${errorMessage}" style="color:red;"></p>
        </div>
    </div>

    <div th:if="${user == null}">
        <p>Connectez-vous pour effectuer un transfert.</p>
    </div>
</main>

<footer>
    <p>&copy; 2026 FlashCash</p>
</footer>

</body>
</html>
